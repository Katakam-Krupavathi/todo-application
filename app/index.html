<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 30px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }

        .add-btn {
            background-color: green;
            color: white;
        }

        .complete-btn {
            background-color: orange;
            color: white;
        }

        .delete-btn {
            background-color: red;
            color: white;
        }

        .task {
            background-color: #f9f9f9;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Todo App</h1>

        <input
            type="text"
            id="title"
            placeholder="Enter title"
        >

        <input
            type="text"
            id="description"
            placeholder="Enter description"
        >

        <button
            class="add-btn"
            onclick="createTask()"
        >
            Add Task
        </button>

        <hr>

        <h2>Tasks</h2>

        <div id="tasks"></div>

    </div>

    <script>

        const API_URL = "http://127.0.0.1:8000";

        async function getTasks() {

            const response =
                await fetch(`${API_URL}/tasks`);

            const tasks =
                await response.json();

            const tasksDiv =
                document.getElementById("tasks");

            tasksDiv.innerHTML = "";

            tasks.forEach(task => {

                tasksDiv.innerHTML += `
                    <div class="task">

                        <h3>${task.title}</h3>

                        <p>${task.description}</p>

                        <p>
                            Completed:
                            ${task.completed}
                        </p>

                        <button
                            class="complete-btn"
                            onclick="completeTask(${task.id})"
                        >
                            Complete
                        </button>

                        <button
                            class="delete-btn"
                            onclick="deleteTask(${task.id})"
                        >
                            Delete
                        </button>

                    </div>
                `;
            });
        }

        async function createTask() {

            const title =
                document.getElementById("title").value;

            const description =
                document.getElementById("description").value;

            await fetch(`${API_URL}/tasks`, {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    title,
                    description,
                    completed: false
                })
            });

            document.getElementById("title").value = "";

            document.getElementById("description").value = "";

            getTasks();
        }

        async function completeTask(id) {

            await fetch(`${API_URL}/tasks/${id}`, {
                method: "PUT"
            });

            getTasks();
        }

        async function deleteTask(id) {

            await fetch(`${API_URL}/tasks/${id}`, {
                method: "DELETE"
            });

            getTasks();
        }

        getTasks();

    </script>

</body>
</html>
