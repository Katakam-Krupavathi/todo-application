version: "3.9"

services:

  api:
    build: .

    container_name: fastapi_app

    ports:
      - "8000:8000"

    depends_on:
      - db
    restart : always

    env_file:
      - .env

  db:
    image: postgres:15

    container_name: todo_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: